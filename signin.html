<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/emlak.css" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Login & SignUp page -->

    <div class="wrapper">
      <div class="form-box signin">
        <h2>Sign In</h2>
        <form action="#">
          <div class="input-box">
            <span class="ico"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" required />
            <label for="">Email</label>
          </div>
          <div class="input-box">
            <span class="ico"><i class="fa-solid fa-lock"></i></span>
            <input type="password" required id="password"/>
            <img src="images/pass-hide.png" onclick="pass()" class="passicon" id="passicon">
            <label for="">Password</label>
          </div>
          <div class="remember-forgot">
            <label><input type="checkbox" checked /> Remember me</label>
            <a href="#">Forgot Password?</a>
          </div>
          <a href="index.html">
            <button type="submit" class="btnn">Sign in</button>
          </a>
          <div class="signin-signup">
            <p>
              Don't have an account?<a href="signup.html" class="signup-link">
                Sign up</a
              >
            </p>
          </div>
        </form>
        <div class="media-options">
          <a
            href="#"
            target="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox"
          >
          <i class="fa-brands fa-google"></i>
            <span>sign in with Google</span>
            
          </a>
          <a href="#" target="_blank">
            <i class="fa-brands fa-facebook"></i>
            <span>Sign in with Facebook</span>
          </a>
        </div>
      </div>
    </div>
    <script>
      var a;
      function pass()
      {
        if(a==1)
          {
            document.getElementById("password").type="password";
            document.getElementById("passicon").src="images/pass-hide.png";
            a=0;
          }
          else {
            document.getElementById("password").type="text";
            document.getElementById("passicon").src="images/pass-show.png";
            a=1;
          }
      }
    </script>
  </body>
</html>
