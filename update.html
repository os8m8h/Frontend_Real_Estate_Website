    <section class="form-container">
      <form action="" method="post">
        <h3>update your account!</h3>
        <input
          type="tel"
          name="name"
          maxlength="50"
          placeholder="name"
          class="box"
        />
        <input
          type="email"
          name="email"
          maxlength="50"
          placeholder="email"
          class="box"
        />
        <input
          type="tel"
          name="number"
          min="0"
          max="9999999999"
          maxlength="10"
          placeholder="number"
          class="box"
        />
        <input
          type="password"
          name="old_pass"
          maxlength="20"
          placeholder="enter your old password"
          class="box"
        />
        <input
          type="password"
          name="new_pass"
          maxlength="20"
          placeholder="enter your new password"
          class="box"
        />
        <input
          type="password"
          name="c_pass"
          maxlength="20"
          placeholder="confirm your new password"
          class="box"
        />
        <input type="submit" value="update now" name="submit" class="btn" />
      </form>
